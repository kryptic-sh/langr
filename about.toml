# cargo-about configuration. Lists the license identifiers we accept from the
# dependency tree; `cargo about generate` fails if a dependency uses anything
# not listed here, so a copyleft dep can never sneak in unnoticed.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unlicense",
    "BSL-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
]
