name: Publish

# Publishes the crate to crates.io when a version tag is pushed. Requires a
# CARGO_REGISTRY_TOKEN repository secret (crates.io API token). Also runnable
# via workflow_dispatch to retry a publish without re-tagging.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable
      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(cargo metadata --no-deps --format-version 1 | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['packages'][0]['version'])")
          echo "tag=$tag crate=$crate"
          test "$tag" = "$crate" || { echo "tag v$tag != Cargo.toml $crate"; exit 1; }
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          # Idempotency probe (crates.io 403s UA-less requests) so a re-run
          # after a partial release skips instead of failing.
          if curl -fsS -A "langr-release-ci" -o /dev/null "https://crates.io/api/v1/crates/langr/$VERSION"; then
            echo "langr $VERSION already on crates.io — skipping"
            exit 0
          fi
          # Publish with hjkl-style 429 retries: parse crates.io's
          # "try again after" timestamp (11-min fallback), 3 attempts;
          # non-rate-limit failures fail fast.
          attempt=0
          while [ $attempt -lt 3 ]; do
            if cargo publish --locked 2>&1 | tee /tmp/publish.log; then
              exit 0
            fi
            if grep -qiE "429|Too Many Requests" /tmp/publish.log; then
              wait_until=$(grep -oE 'try again after [^.]+' /tmp/publish.log | sed 's/try again after //' || true)
              if [ -n "$wait_until" ]; then
                wait_secs=$(( $(date -d "$wait_until" +%s) - $(date +%s) + 30 ))
                [ "$wait_secs" -lt 30 ] && wait_secs=30
                echo "::warning::rate limited, sleeping ${wait_secs}s until $wait_until"
              else
                wait_secs=660
                echo "::warning::rate limited, sleeping ${wait_secs}s (11 min fallback)"
              fi
              sleep "$wait_secs"
              attempt=$(( attempt + 1 ))
            else
              echo "::error::publish failed (non-rate-limit error)"
              exit 1
            fi
          done
          echo "::error::publish failed after 3 rate-limit retries"
          exit 1
