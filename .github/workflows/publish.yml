name: Publish

# Publishes the crate to crates.io when a version tag is pushed. Requires a
# CARGO_REGISTRY_TOKEN repository secret (crates.io API token). Also runnable
# via workflow_dispatch to retry a publish without re-tagging.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable
      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(cargo metadata --no-deps --format-version 1 | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['packages'][0]['version'])")
          echo "tag=$tag crate=$crate"
          test "$tag" = "$crate" || { echo "tag v$tag != Cargo.toml $crate"; exit 1; }
      - name: Publish
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
